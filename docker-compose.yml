services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: worship_flow
      POSTGRES_PASSWORD: worship_flow
      POSTGRES_DB: service_tracks
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worship_flow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
